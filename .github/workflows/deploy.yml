name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP to IONOS
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USER }}
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASS }}
          SFTP_DIR: ${{ secrets.IONOS_FTP_DIR }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 120;
            open sftp://$SFTP_USER:$SFTP_PASS@$SFTP_HOST;
            put -O / .htaccess;
            put -O / robots.txt;
            put -O / sitemap.xml;
            put -O $SFTP_DIR index.html;
            put -O $SFTP_DIR impressum.html;
            put -O $SFTP_DIR datenschutz.html;
            put -O $SFTP_DIR standorte.html;
            put -O $SFTP_DIR favicon.ico;
            put -O $SFTP_DIR favicon-16x16.png;
            put -O $SFTP_DIR favicon-32x32.png;
            put -O $SFTP_DIR favicon-48x48.png;
            put -O $SFTP_DIR apple-touch-icon.png;
            put -O $SFTP_DIR logo.png;
            put -O $SFTP_DIR og-image.jpg;
            put -O $SFTP_DIR video_harley.mp4;
            put -O $SFTP_DIR video_hochhaus.mp4;
            put -O $SFTP_DIR video_rettig.mp4;
            mirror -R --parallel=5 images $SFTP_DIR/images;
            mirror -R --parallel=5 standorte $SFTP_DIR/standorte;
          "
