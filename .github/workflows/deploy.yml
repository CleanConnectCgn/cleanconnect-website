name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP to IONOS
        env:
          SFTP_HOST: ${{ secrets.IONOS_FTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USER }}
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASS }}
          SFTP_DIR: ${{ secrets.IONOS_FTP_DIR }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            open sftp://$SFTP_USER:$SFTP_PASS@$SFTP_HOST;
            mirror --reverse --delete --exclude-glob .git/ --exclude-glob .github/ --exclude README.md --exclude package.json --exclude server.js ./ $SFTP_DIR
          "
